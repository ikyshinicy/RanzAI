<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RanzAI — Image Prompt Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="app-page">

<div class="top-controls">
  <button class="control-btn" data-lang-btn="id">ID</button>
  <button class="control-btn" data-lang-btn="en">EN</button>
  <button class="control-btn" data-theme-toggle>☾ Dark</button>
</div>

<div class="container">
  <header class="app-header">
    <div class="badge">✦ RanzAI</div>
    <h1><span data-i18n="app_title">Image →</span> <span data-i18n="app_title_accent">Prompt</span></h1>
    <p class="subtitle" data-i18n="app_subtitle">upload gambar · generate · copy · done</p>
  </header>

  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*">
    <span class="upload-icon">⬆</span>
    <div class="upload-label" data-i18n="upload_text">Drop gambar di sini atau klik untuk pilih</div>
    <div class="upload-hint" data-i18n="upload_hint">JPG, PNG, WEBP — maks 10MB</div>
  </div>

  <div class="preview-wrap" id="previewWrap">
    <img id="previewImg" src="" alt="preview">
    <button class="preview-remove" id="removeBtn" data-i18n="replace">✕ Ganti</button>
  </div>

  <div class="option-group" data-group="format">
    <div class="option-label" data-i18n="output_format">Output Format</div>
    <div class="format-row">
      <button class="fmt-btn active" data-format="json">JSON Structured</button>
      <button class="fmt-btn" data-format="plain">Plain Text</button>
    </div>
  </div>

  <div class="option-group" data-group="target">
    <div class="option-label" data-i18n="target_ai">Target AI</div>
    <div class="format-row">
      <button class="fmt-btn active" data-target="chatgpt">ChatGPT</button>
      <button class="fmt-btn" data-target="gemini">Gemini</button>
      <button class="fmt-btn" data-target="midjourney">Midjourney</button>
    </div>
    <div class="format-row">
      <button class="fmt-btn" data-target="flux">Flux</button>
      <button class="fmt-btn" data-target="sdxl">SDXL</button>
      <button class="fmt-btn" data-target="leonardo">Leonardo</button>
    </div>
    <div class="format-row">
      <button class="fmt-btn" data-target="ideogram">Ideogram</button>
      <button class="fmt-btn" data-target="recraft">Recraft</button>
      <button class="fmt-btn" data-target="dalle">DALL·E</button>
    </div>
  </div>

  <div class="option-group" data-group="style">
    <div class="option-label" data-i18n="visual_style">Visual Style</div>
    <div class="format-row">
      <button class="fmt-btn active" data-style="normal">Normal</button>
      <button class="fmt-btn" data-style="cinematic">Cinematic</button>
      <button class="fmt-btn" data-style="poster_ads">Poster Ads</button>
    </div>
    <div class="format-row">
      <button class="fmt-btn" data-style="anime">Anime</button>
      <button class="fmt-btn" data-style="realistic">Realistic</button>
      <button class="fmt-btn" data-style="luxury">Luxury</button>
    </div>
    <div class="format-row">
      <button class="fmt-btn" data-style="streetwear">Streetwear</button>
      <button class="fmt-btn" data-style="techwear">Techwear</button>
      <button class="fmt-btn" data-style="cyberpunk">Cyberpunk</button>
    </div>
  </div>

  <button class="btn-generate" id="generateBtn" disabled>
    <div class="spinner"></div>
    <span class="btn-text" data-i18n="generate">✦ Generate Prompt</span>
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="result-box" id="resultBox">
    <div class="result-header">
      <span class="result-title" data-i18n="output_prompt">OUTPUT PROMPT</span>
      <button class="btn-copy" id="copyBtn" data-i18n="copy">Copy</button>
    </div>
    <div class="result-content" id="resultContent"></div>
  </div>

  <footer class="app-footer" data-i18n="app_footer">RanzAI · powered by OpenAI Vision · by Iky</footer>
</div>

<script src="assets/js/ui.js" defer></script>
<script src="assets/js/targets.js" defer></script>
<script src="assets/js/styles.js" defer></script>
<script src="assets/js/engine.js" defer></script>
<script src="assets/js/app.js" defer></script>
</body>
</html>
