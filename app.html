<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RanzAI — Image Prompt Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#0d0d0f; --surface:#141417; --border:#2a2a30; --accent:#e8ff47; --accent2:#7c5cfc; --text:#f0f0f0; --muted:#6b6b7a; --radius:12px; }
  body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:40px 20px; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
  .container { width:100%; max-width:680px; position:relative; z-index:1; }
  header { text-align:center; margin-bottom:40px; }
  .badge { display:inline-block; font-family:'Space Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--accent); border:1px solid var(--accent); padding:4px 12px; border-radius:20px; margin-bottom:14px; text-transform:uppercase; }
  h1 { font-size:clamp(28px,6vw,42px); font-weight:800; line-height:1.1; letter-spacing:-1px; }
  h1 span { color:var(--accent); }
  .subtitle { margin-top:10px; color:var(--muted); font-size:14px; font-family:'Space Mono',monospace; }
  .upload-zone { background:var(--surface); border:2px dashed var(--border); border-radius:var(--radius); padding:40px 20px; text-align:center; cursor:pointer; transition:all .25s ease; position:relative; overflow:hidden; }
  .upload-zone:hover,.upload-zone.drag-over { border-color:var(--accent); background:#1a1a1f; }
  .upload-zone input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .upload-icon { font-size:36px; margin-bottom:12px; display:block; }
  .upload-label { font-size:15px; font-weight:600; color:var(--text); }
  .upload-hint { font-size:12px; color:var(--muted); margin-top:6px; font-family:'Space Mono',monospace; }
  .preview-wrap { display:none; margin-top:20px; border-radius:var(--radius); overflow:hidden; position:relative; border:1px solid var(--border); }
  .preview-wrap img { width:100%; max-height:320px; object-fit:contain; background:#0b0b0d; display:block; }
  .preview-remove { position:absolute; top:10px; right:10px; background:rgba(0,0,0,.7); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer; font-family:'Space Mono',monospace; transition:background .2s; }
  .preview-remove:hover { background:#ff4d4d; border-color:#ff4d4d; }
  .option-group { margin-top:20px; }
  .option-label { font-family:'Space Mono',monospace; font-size:11px; color:var(--accent); letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
  .format-row { display:flex; gap:10px; margin-top:10px; }
  .format-row:first-of-type { margin-top:0; }
  .fmt-btn { flex:1; background:var(--surface); border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:10px; font-family:'Space Mono',monospace; font-size:12px; cursor:pointer; transition:all .2s; text-align:center; }
  .fmt-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(232,255,71,.06); }
  .btn-generate { width:100%; margin-top:20px; background:var(--accent); color:#0d0d0f; border:none; border-radius:var(--radius); padding:16px; font-family:'Syne',sans-serif; font-size:16px; font-weight:800; letter-spacing:1px; cursor:pointer; transition:all .2s; text-transform:uppercase; display:flex; align-items:center; justify-content:center; gap:10px; }
  .btn-generate:hover { background:#d4eb3a; transform:translateY(-1px); }
  .btn-generate:disabled { background:var(--border); color:var(--muted); transform:none; cursor:not-allowed; }
  .btn-generate .spinner { width:18px; height:18px; border:2px solid rgba(0,0,0,.3); border-top-color:#0d0d0f; border-radius:50%; animation:spin .7s linear infinite; display:none; }
  .btn-generate.loading .spinner { display:block; }
  .btn-generate.loading .btn-text { opacity:.6; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .result-box { display:none; margin-top:24px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  .result-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); background:#1a1a1f; }
  .result-title { font-size:12px; font-family:'Space Mono',monospace; color:var(--accent); letter-spacing:1px; }
  .btn-copy { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:5px 14px; font-size:12px; font-family:'Space Mono',monospace; cursor:pointer; transition:all .2s; }
  .btn-copy:hover { border-color:var(--accent); color:var(--accent); }
  .btn-copy.copied { border-color:#4dff91; color:#4dff91; }
  .result-content { padding:20px; font-family:'Space Mono',monospace; font-size:13px; line-height:1.7; color:#c8c8d8; white-space:pre-wrap; word-break:break-word; max-height:420px; overflow-y:auto; }
  .key { color:var(--accent2); } .string { color:#e8ff47; } .number { color:#ff9f47; }
  .error-msg { display:none; margin-top:16px; background:rgba(255,77,77,.08); border:1px solid rgba(255,77,77,.3); border-radius:8px; padding:12px 16px; font-size:13px; color:#ff8080; font-family:'Space Mono',monospace; }
  footer { margin-top:40px; text-align:center; font-size:11px; color:var(--muted); font-family:'Space Mono',monospace; }
  @media (max-width:640px){ body{padding:32px 16px;} .format-row{flex-direction:column;} }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">✦ RanzAI</div>
    <h1>Image → <span>Prompt</span></h1>
    <p class="subtitle">upload gambar · generate · copy · done</p>
  </header>

  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*">
    <span class="upload-icon">⬆</span>
    <div class="upload-label">Drop gambar di sini atau klik untuk pilih</div>
    <div class="upload-hint">JPG, PNG, WEBP — maks 10MB</div>
  </div>

  <div class="preview-wrap" id="previewWrap">
    <img id="previewImg" src="" alt="preview">
    <button class="preview-remove" id="removeBtn">✕ Ganti</button>
  </div>

  <div class="option-group" data-group="format">
    <div class="option-label">Output Format</div>
    <div class="format-row">
      <button class="fmt-btn active" data-format="json">JSON Structured</button>
      <button class="fmt-btn" data-format="plain">Plain Text</button>
    </div>
  </div>

  <div class="option-group" data-group="target">
    <div class="option-label">Target AI</div>
    <div class="format-row">
      <button class="fmt-btn active" data-target="chatgpt">ChatGPT</button>
      <button class="fmt-btn" data-target="gemini">Gemini</button>
      <button class="fmt-btn" data-target="midjourney">Midjourney</button>
    </div>
    <div class="format-row">
      <button class="fmt-btn" data-target="flux">Flux</button>
      <button class="fmt-btn" data-target="sdxl">SDXL</button>
      <button class="fmt-btn" data-target="leonardo">Leonardo</button>
    </div>
    <div class="format-row">
      <button class="fmt-btn" data-target="ideogram">Ideogram</button>
      <button class="fmt-btn" data-target="recraft">Recraft</button>
      <button class="fmt-btn" data-target="dalle">DALL·E</button>
    </div>
  </div>

  <div class="option-group" data-group="style">
    <div class="option-label">Visual Style</div>
    <div class="format-row">
      <button class="fmt-btn active" data-style="normal">Normal</button>
      <button class="fmt-btn" data-style="cinematic">Cinematic</button>
      <button class="fmt-btn" data-style="poster_ads">Poster Ads</button>
    </div>
    <div class="format-row">
      <button class="fmt-btn" data-style="anime">Anime</button>
      <button class="fmt-btn" data-style="realistic">Realistic</button>
      <button class="fmt-btn" data-style="luxury">Luxury</button>
    </div>
    <div class="format-row">
      <button class="fmt-btn" data-style="streetwear">Streetwear</button>
      <button class="fmt-btn" data-style="techwear">Techwear</button>
      <button class="fmt-btn" data-style="cyberpunk">Cyberpunk</button>
    </div>
  </div>

  <button class="btn-generate" id="generateBtn" disabled>
    <div class="spinner"></div>
    <span class="btn-text">✦ Generate Prompt</span>
  </button>

  <div class="error-msg" id="errorMsg"></div>
  <div class="result-box" id="resultBox">
    <div class="result-header">
      <span class="result-title">OUTPUT PROMPT</span>
      <button class="btn-copy" id="copyBtn">Copy</button>
    </div>
    <div class="result-content" id="resultContent"></div>
  </div>
  <footer>RanzAI · powered by OpenAI Vision · by Iky</footer>
</div>

<script src="assets/js/targets.js" defer></script>
<script src="assets/js/styles.js" defer></script>
<script src="assets/js/engine.js" defer></script>
<script src="assets/js/app.js" defer></script>
</body>
</html>
