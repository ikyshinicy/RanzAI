<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RanzAI — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<style>
  .dash-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin: 24px 0;
  }
  .dash-card {
    background: rgba(255,255,255,.04);
    border: 1px solid #2a2a30;
    border-radius: 14px;
    padding: 20px;
    font-family: 'Space Mono', monospace;
  }
  .dash-card .card-label {
    font-size: 10px;
    color: #6b6b7a;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .dash-card .card-value {
    font-size: 28px;
    font-weight: 700;
    color: #e8ff47;
    font-family: 'Syne', sans-serif;
  }
  .dash-card .card-sub {
    font-size: 10px;
    color: #6b6b7a;
    margin-top: 4px;
  }
  .dash-card.accent {
    border-color: rgba(232,255,71,.3);
    background: rgba(232,255,71,.05);
  }
  .user-card {
    background: rgba(255,255,255,.04);
    border: 1px solid #2a2a30;
    border-radius: 14px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    font-family: 'Space Mono', monospace;
  }
  .user-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(232,255,71,.15);
    border: 1px solid rgba(232,255,71,.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .user-info .user-name {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #f0f0f0;
  }
  .user-info .user-email {
    font-size: 11px;
    color: #6b6b7a;
    margin-top: 2px;
  }
  .user-info .user-plan {
    display: inline-block;
    margin-top: 6px;
    font-size: 10px;
    padding: 2px 10px;
    border-radius: 20px;
    background: rgba(124,92,252,.15);
    border: 1px solid rgba(124,92,252,.3);
    color: #a090f0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .dash-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin: 24px 0;
  }
  .btn-dash {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: all .2s;
  }
  .btn-dash.primary {
    background: #e8ff47;
    color: #0d0d0f;
  }
  .btn-dash.primary:hover { background: #d4eb3a; }
  .btn-dash.secondary {
    background: transparent;
    color: #f0f0f0;
    border: 1px solid #2a2a30;
  }
  .btn-dash.secondary:hover { border-color: #6b6b7a; }
  .btn-dash.danger {
    background: transparent;
    color: #ff6b6b;
    border: 1px solid rgba(255,107,107,.3);
  }
  .btn-dash.danger:hover { background: rgba(255,107,107,.1); }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #6b6b7a;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 28px 0 12px;
  }
  .loading-text {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: #6b6b7a;
  }
  .topup-banner {
    background: rgba(232,255,71,.06);
    border: 1px solid rgba(232,255,71,.2);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .topup-banner .topup-text {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: #e8ff47;
  }
  .topup-banner .topup-sub {
    font-size: 10px;
    color: #6b6b7a;
    margin-top: 2px;
  }
</style>
</head>
<body class="app-page">

<div class="top-controls">
  <a href="../app.html" class="control-btn">🏠 App</a>
  <button class="control-btn" data-theme-toggle>☾ Dark</button>
</div>

<div class="container" style="max-width:640px;">

  <header class="app-header" style="margin-bottom:24px;">
    <div class="badge">✦ RanzAI</div>
    <h1>Dashboard</h1>
    <p class="subtitle" id="greetMsg">Selamat datang!</p>
  </header>

  <!-- User Card -->
  <div class="user-card">
    <div class="user-avatar">👤</div>
    <div class="user-info">
      <div class="user-name" id="userName">—</div>
      <div class="user-email" id="userEmail">—</div>
      <span class="user-plan" id="userPlan">Free</span>
    </div>
  </div>

  <!-- Top Up Banner -->
  <div class="topup-banner" id="topupBanner" style="display:none;">
    <div>
      <div class="topup-text">⚡ Kredit kamu habis!</div>
      <div class="topup-sub">Rp 1.000 = 1 generate</div>
    </div>
    <a href="../topup.html" class="btn-dash primary" style="font-size:12px; padding:10px 16px;">Top Up →</a>
  </div>

  <!-- Stats -->
  <div class="section-title">Kredit & Penggunaan</div>
  <div class="dash-grid">
    <div class="dash-card accent">
      <div class="card-label">⚡ Kredit Tersisa</div>
      <div class="card-value" id="creditTotal">—</div>
      <div class="card-sub">Free + Paid credit</div>
    </div>
    <div class="dash-card">
      <div class="card-label">🎁 Free Credit</div>
      <div class="card-value" id="freeCredit" style="color:#a090f0;">—</div>
      <div class="card-sub">1x gratis untuk coba</div>
    </div>
    <div class="dash-card">
      <div class="card-label">💳 Paid Credit</div>
      <div class="card-value" id="paidCredit" style="color:#f0f0f0;">—</div>
      <div class="card-sub">Rp 1.000 per credit</div>
    </div>
  </div>

  <!-- Actions -->
  <div class="section-title">Menu</div>
  <div class="dash-actions">
    <a href="../app.html" class="btn-dash primary">✦ Generate Prompt</a>
    <a href="../topup.html" class="btn-dash secondary">⚡ Top Up Credit</a>
    <button class="btn-dash danger" onclick="logout()">Logout</button>
  </div>

</div>

<script src="../assets/js/ui.js"></script>
<script>
  const SUPABASE_URL = 'https://cavouyzyasnuygkuwizy.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_6eixKKot9VleMm2KVD4o7w_C58lRv6r';

  function getSession() {
    const raw = localStorage.getItem('ranzai_session');
    return raw ? JSON.parse(raw) : null;
  }

  function logout() {
    localStorage.removeItem('ranzai_session');
    window.location.href = '../auth/login.html';
  }

  function getGreeting() {
    const h = new Date().getHours();
    if (h < 12) return 'Selamat pagi';
    if (h < 15) return 'Selamat siang';
    if (h < 18) return 'Selamat sore';
    return 'Selamat malam';
  }

  async function loadDashboard() {
    const session = getSession();
    if (!session?.user?.id) {
      window.location.href = '../auth/login.html';
      return;
    }

    const user = session.user;
    const name = user.user_metadata?.full_name || user.email?.split('@')[0] || 'User';

    document.getElementById('greetMsg').textContent = getGreeting() + ', ' + name + '!';
    document.getElementById('userName').textContent = name;
    document.getElementById('userEmail').textContent = user.email || '—';

    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/user_credits?user_id=eq.${user.id}&select=free_used,paid_credits,plan`,
        { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${session.access_token}` } }
      );
      const data = await res.json();
      const row = data[0] || { free_used: 0, paid_credits: 0, plan: 'free' };

      const freeLeft   = row.free_used < 1 ? 1 : 0;
      const paid       = row.paid_credits || 0;
      const total      = freeLeft + paid;
      const plan       = row.plan || 'free';

      document.getElementById('freeCredit').textContent  = freeLeft;
      document.getElementById('paidCredit').textContent  = paid;
      document.getElementById('creditTotal').textContent = total;
      document.getElementById('userPlan').textContent    = plan.toUpperCase();

      if (total === 0) {
        document.getElementById('topupBanner').style.display = 'flex';
      }
    } catch(e) {
      document.getElementById('creditTotal').textContent = '?';
    }
  }

  window.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
